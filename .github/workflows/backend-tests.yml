name: Backend Tests

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-tests.yml"
      - "package.json"
      - "yarn.lock"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-tests.yml"
      - "package.json"
      - "yarn.lock"

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn --cwd apps/api prisma generate

      - name: Install Playwright Chromium
        run: yarn --cwd apps/api playwright install chromium

      - name: Run API integration tests
        run: yarn --cwd apps/api test:int

      - name: Run API e2e tests
        run: yarn --cwd apps/api test:e2e
