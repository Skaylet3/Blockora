name: Backend Tests

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-tests.yml"
      - "package.json"
      - "yarn.lock"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-tests.yml"
      - "package.json"
      - "yarn.lock"

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: yarn --cwd apps/api playwright install chromium

      - name: Run API integration tests
        run: yarn --cwd apps/api test:int

      - name: Run API e2e tests
        run: yarn --cwd apps/api test:e2e
