name: API Prod Migrate

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Run production migrations
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.API_DATABASE_URL_PROD }}
        run: yarn migrate:deploy
