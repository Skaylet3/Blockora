name: Frontend Tests

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - ".github/workflows/frontend-tests.yml"
      - "package.json"
      - "yarn.lock"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - ".github/workflows/frontend-tests.yml"
      - "package.json"
      - "yarn.lock"

jobs:
  web-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Run web lint
        run: yarn --cwd apps/web lint

      - name: Run web unit tests
        run: yarn --cwd apps/web test

      - name: Run web build
        run: yarn --cwd apps/web build
